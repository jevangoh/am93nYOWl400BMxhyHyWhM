name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  markdown-lint:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Pixi
          uses: prefix-dev/setup-pixi@v0.8.0
          with:
            environments: dev
            cache: true

        - name: Run Markdown Lint
          run: pixi run -e dev lint_markdown

        - name: Run Markdown Format
          run: pixi run -e dev format_markdown          

        - name: Check for drift
          run: git diff --exit-code
