repos:
  - repo: local
    hooks:
      - id: pixi-install
        name: pixi-install
        entry: pixi install
        language: system
        pass_filenames: false

      - id: format-documents
        name: format-documents
        entry: pixi run -e dev format_documents
        language: system
        pass_filenames: true

      - id: check-for-drift
        name: check-for-drift
        entry: git diff --exit-code
        language: system
        pass_filenames: false
