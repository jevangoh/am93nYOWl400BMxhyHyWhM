version: 2

mkdocs:
  configuration: mkdocs.yaml

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  
  commands:
    - curl -fsSL https://pixi.sh/install.sh | bash
    - export PATH="$HOME/.pixi/bin:$PATH" && $HOME/.pixi/bin/pixi install -e dev
    # - export PATH="$HOME/.pixi/bin:$PATH" && $HOME/.pixi/bin/pixi run -e dev mkdocs build --config-file ot1j9dc4rdqcs45pcvpho3jgr/mkdocs.yaml --site-dir $READTHEDOCS_OUTPUT/html
    - export PATH="$HOME/.pixi/bin:$PATH" && $HOME/.pixi/bin/pixi run -e dev build_docs --site-dir $READTHEDOCS_OUTPUT/html