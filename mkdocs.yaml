site_name: ot1j9dc4rdqcs45pcvpho3jgr

theme:
  name: material
  palette:
    # Automatic/System Mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Light Mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: ot1j9dc4rdqcs45pcvpho3jgr

markdown_extensions:
  - pymdownx.snippets:
      base_path: ["."]

plugins:
  - search

validation:
  nav:
    not_found: info
    omitted_files: info
  links:
    not_found: info

nav:
  - Home: index.md
  - About Repository:
      - About: about_repository/about.md
      - Labels: about_repository/labels.md
  - Glossary: glossary.md
  - Useage: useage.md
  - Code of Conduct: code_of_conduct.md
  - Contributing: contributing.md
  - Contributors: contributors.md
  - Governance: governance.md
  - Labels: labels.md
  - Support: support.md
  - Ticketing: ticketing.md
  - Maintaining: maintaining.md
  - Security: security.md
